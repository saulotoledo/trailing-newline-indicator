name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ERT (${{ matrix.emacs-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - '26.3'
          - '27.2'
          - '28.2'
          - '29.4'
          - '30.1'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Emacs ${{ matrix.emacs-version }}
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Run ERT tests
        run: make test
